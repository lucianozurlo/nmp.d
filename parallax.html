<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parallax Scroll</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            height: 300vh;
            /* Aumentamos la altura para permitir el scroll */
        }

        .parallax {
            position: fixed;
            top: 0;
            width: 100%;
            height: 100vh;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
        }

        #layer1 {
            background-color: rgba(255, 0, 0, 0.6);
            transform: translateZ(-1px) scale(2);
            /* Mueve y escala para crear el efecto */
        }

        #layer2 {
            background-color: rgba(0, 255, 0, 0.6);
            transform: translateZ(0px) scale(1);
        }

        #layer3 {
            background-color: rgba(0, 0, 255, 0.6);
            transform: translateZ(1px) scale(0.5);
        }

        .content {
            position: relative;
            z-index: 10;
            /* Asegura que el contenido esté sobre las capas */
            padding: 20px;
            background: white;
            margin: 0 auto;
            width: 80%;
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <div class="parallax" id="layer1">Capa 1</div>
    <div class="parallax" id="layer2">Capa 2</div>
    <div class="parallax" id="layer3">Capa 3</div>
    <div class="content">
        <h1>Contenido de la página</h1>
        <p>Desplaza hacia abajo para ver el efecto parallax.</p>
    </div>
    <script>
        window.addEventListener('scroll', () => {
            const scrolled = window.scrollY;

            document.getElementById('layer1').style.transform = `translateY(${scrolled * 0.5}px)`; // Movimiento más lento
            document.getElementById('layer2').style.transform = `translateY(${scrolled * 0.75}px)`; // Movimiento medio
            document.getElementById('layer3').style.transform = `translateY(${scrolled * 1}px)`; // Movimiento normal
        });

    </script>
</body>

</html>
